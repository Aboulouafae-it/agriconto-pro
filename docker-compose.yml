services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agriconto}
      POSTGRES_USER: ${POSTGRES_USER:-agriconto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agriconto_dev_password_change_me}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agriconto} -d ${POSTGRES_DB:-agriconto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: AgriConto Pro
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-agriconto}:${POSTGRES_PASSWORD:-agriconto_dev_password_change_me}@postgres:5432/${POSTGRES_DB:-agriconto}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-change-this-secret-minimum-32-characters}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      STORAGE_ROOT: /app/storage
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - backend-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_HOST_PORT:-8000}/api/v1
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres-data:
  backend-storage:
